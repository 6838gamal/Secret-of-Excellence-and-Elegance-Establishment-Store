version: "3.9"

# نسخة مبسطة بدون PostgreSQL — مناسبة للاختبار والنشر الخفيف
services:
  app:
    build: .
    container_name: tamayoz_app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./app/static:/app/app/static
    networks:
      - tamayoz_net

networks:
  tamayoz_net:
    driver: bridge
