services:
  - type: web
    name: tamayoz-payment
    runtime: docker
    plan: free
    envVars:
      - key: SESSION_SECRET
        generateValue: true          # Render ينشئ مفتاحاً عشوائياً تلقائياً
      - key: DATABASE_URL
        value: sqlite:///./data/tamayoz.db
      - key: ADMIN_EMAIL
        value: admin@tamayoz.com
      - key: ADMIN_PASSWORD
        sync: false                  # ستُدخله يدوياً في لوحة Render
      - key: BEEZATI_API_KEY
        sync: false
      - key: BEEZATI_SECRET
        sync: false
      - key: BEEZATI_WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: "5000"
    disk:
      name: tamayoz-data
      mountPath: /app/data
      sizeGB: 1
