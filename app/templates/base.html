<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ company_name }}{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#f5f3ff', 100:'#ede9fe', 500:'#8b5cf6', 600:'#7c3aed', 700:'#6d28d9', 900:'#1a0a2e' },
            gold: { 400:'#fbbf24', 500:'#f59e0b', 600:'#d97706' }
          },
          fontFamily: { arabic: ['Tajawal', 'sans-serif'] }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Tajawal', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #1a0a2e 0%, #2d1b69 50%, #1a0a2e 100%); }
    .gold-gradient { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .card-glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.12); }
    .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a0a2e; font-weight: 700; transition: all 0.3s; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(245,158,11,0.4); }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="gradient-bg min-h-screen text-white">
  {% block body %}{% endblock %}

  <!-- Hidden Admin Login Modal -->
  <div id="adminModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70 backdrop-blur-sm">
    <div class="bg-brand-900 border border-brand-500/30 rounded-2xl p-8 w-full max-w-md mx-4 animate-fade-in shadow-2xl">
      <div class="text-center mb-6">
        <div class="w-16 h-16 gold-gradient rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔐</div>
        <h2 class="text-2xl font-bold text-white">دخول الإدارة</h2>
        <p class="text-white/50 text-sm mt-1">{{ company_name }}</p>
      </div>
      <div id="loginError" class="hidden bg-red-500/20 border border-red-500/40 rounded-lg p-3 mb-4 text-red-300 text-sm text-center"></div>
      <form id="adminLoginForm" onsubmit="doLogin(event)">
        <div class="mb-4">
          <label class="block text-white/70 text-sm mb-2">البريد الإلكتروني</label>
          <input type="email" name="email" required placeholder="admin@example.com"
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-gold-400 transition-colors" />
        </div>
        <div class="mb-6">
          <label class="block text-white/70 text-sm mb-2">كلمة المرور</label>
          <input type="password" name="password" required placeholder="••••••••"
                 class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 focus:outline-none focus:border-gold-400 transition-colors" />
        </div>
        <button type="submit" id="loginBtn"
                class="w-full btn-gold rounded-xl py-3 text-lg font-bold">
          دخول
        </button>
      </form>
      <button onclick="closeAdminModal()" class="w-full mt-4 text-white/40 hover:text-white/70 text-sm transition-colors">إغلاق</button>
    </div>
  </div>

  <script>
    function openAdminModal() { document.getElementById('adminModal').classList.replace('hidden','flex'); }
    function closeAdminModal() { document.getElementById('adminModal').classList.replace('flex','hidden'); }

    async function doLogin(e) {
      e.preventDefault();
      const form = e.target;
      const btn = document.getElementById('loginBtn');
      const errDiv = document.getElementById('loginError');
      btn.disabled = true; btn.textContent = 'جارٍ التحقق...';
      errDiv.classList.add('hidden');

      const body = new URLSearchParams({ email: form.email.value, password: form.password.value });
      try {
        const res = await fetch('/admin/login', { method:'POST', body, headers:{'Content-Type':'application/x-www-form-urlencoded'} });
        const data = await res.json();
        if (data.success) { window.location.href = data.redirect; }
        else { errDiv.textContent = data.message; errDiv.classList.remove('hidden'); }
      } catch(err) { errDiv.textContent = 'حدث خطأ، حاول مجدداً'; errDiv.classList.remove('hidden'); }
      finally { btn.disabled = false; btn.textContent = 'دخول'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAdminModal(); });
  </script>
</body>
</html>
