version: "3.9"

services:
  app:
    build: .
    container_name: tamayoz_app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - sqlite_data:/app/tamayoz.db
      - static_files:/app/app/static
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tamayoz_net

  # ─── PostgreSQL (اختياري — احذفه إن كنت تستخدم SQLite) ──────────────────
  db:
    image: postgres:16-alpine
    container_name: tamayoz_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tamayoz_db}
      POSTGRES_USER: ${POSTGRES_USER:-tamayoz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tamayoz}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tamayoz_net

volumes:
  sqlite_data:
  static_files:
  postgres_data:

networks:
  tamayoz_net:
    driver: bridge
